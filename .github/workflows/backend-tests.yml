name: Backend Integration Tests

on:
  push:
    branches: [master, main]
    paths:
      - "apps/backend/**"
      - "packages/shared/**"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    branches: [master, main]
    paths:
      - "apps/backend/**"
      - "packages/shared/**"
      - ".github/workflows/backend-tests.yml"

jobs:
  test:
    name: Run Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: collab_list_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d collab_list_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.16.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/collab_list_test
          NODE_ENV: test
          JWT_SECRET: github-actions-test-secret-key-minimum-32-chars
          PORT: 3001
        run: pnpm test
